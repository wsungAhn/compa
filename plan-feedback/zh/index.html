<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMPA — 方案反馈</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans SC', 'Inter', sans-serif; }
    .section-card { transition: box-shadow 0.2s, border-color 0.2s; }
    .section-card.status-approved { border-left: 4px solid #22c55e; }
    .section-card.status-change   { border-left: 4px solid #f97316; }
    .section-card.status-question { border-left: 4px solid #3b82f6; }
    .section-card.status-pending  { border-left: 4px solid #e5e7eb; }
    .btn-status { transition: all 0.15s; }
    .btn-status.active-approved { background: #22c55e; color: white; }
    .btn-status.active-change   { background: #f97316; color: white; }
    .btn-status.active-question { background: #3b82f6; color: white; }
    .code-block { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 12px 16px; font-family: 'Consolas', monospace; font-size: 12px; overflow-x: auto; line-height: 1.6; }
    .tag-regular { background: #dbeafe; color: #1d4ed8; }
    .tag-surprise { background: #ffedd5; color: #c2410c; }
    details > summary { cursor: pointer; user-select: none; }
    details > summary::-webkit-details-marker { display: none; }
    .chevron { transition: transform 0.2s; }
    details[open] .chevron { transform: rotate(180deg); }
    #progress-bar { transition: width 0.4s ease; }
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8fafc; padding: 8px 12px; text-align: left; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
    td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    .feedback-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Language Nav -->
<div class="bg-gray-900 text-xs text-gray-300 flex justify-center gap-1 py-2">
  <a href="../" class="px-3 py-1 rounded hover:bg-gray-700 transition">🇰🇷 한국어</a>
  <a href="../en/" class="px-3 py-1 rounded hover:bg-gray-700 transition">🇺🇸 English</a>
  <span class="px-3 py-1 rounded bg-rose-600 text-white font-semibold">🇨🇳 中文</span>
</div>

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-rose-500 rounded-lg flex items-center justify-center text-white font-bold text-sm">C</div>
      <div>
        <h1 class="text-gray-900 font-bold text-lg leading-tight">COMPA 主计划 v2</h1>
        <p class="text-gray-400 text-xs">化妆品折扣活动追踪应用 · 已更新反馈</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="resetAll()" class="text-xs text-gray-400 hover:text-gray-600 px-3 py-1.5 rounded border border-gray-200 hover:border-gray-300 transition">重置</button>
      <button onclick="copyFeedback()" class="text-xs border border-gray-300 text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-50 transition">复制 📋</button>

    </div>
  </div>
  <!-- Progress bar -->

    <div class="flex items-center justify-between mb-1.5">

      <div id="progress-bar" class="h-full bg-gradient-to-r from-rose-400 to-rose-500 rounded-full" style="width:0%"></div>
    </div>

      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-gray-300 inline-block"></span>未审核 <span id="cnt-pending" class="font-medium text-gray-600">0</span></span>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-8 space-y-6">

  <!-- Context banner -->
  <div class="bg-rose-50 border border-rose-100 rounded-xl p-5">
    <div class="flex items-start gap-3">
      <span class="text-2xl">🛍️</span>
      <div>
        <p class="text-sm text-rose-800 font-semibold mb-1">COMPA — 化妆品折扣活动追踪器</p>
        <p class="text-sm text-rose-700 leading-relaxed">
          只需输入一个产品名称，即可查看<strong>韩国、美国、日本、中国</strong>近3年所有折扣活动，
          并获得<strong>"现在买 / 等等再买"</strong>的建议。<br/>
          请阅读每个章节，并留下反馈：✅ 批准 / ✏️ 需修改 / ❓ 有问题
        </p>
      </div>
    </div>
  </div>

  <div id="sections-container" class="space-y-5"></div>

  <!-- Feedback Summary -->
  <div id="summary-panel" class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden hidden">
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="font-bold text-gray-800 text-base">反馈摘要</h2>
      <span class="text-xs text-gray-400">仅显示需修改和有问题的条目</span>
    </div>
    <div id="summary-content" class="divide-y divide-gray-50"></div>
  </div>

</main>

<!-- Share Modal -->
<div id="share-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden" onclick="if(event.target===this)closeShareModal()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">

    <div class="px-6 py-4">

      <div class="flex gap-2 mb-3">
        <div class="flex items-center gap-1.5 px-3 py-1.5 bg-green-50 border border-green-200 rounded-lg text-xs text-green-700 font-medium">💚 微信</div>
        <div class="flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700 font-medium">✈️ Telegram</div>
      </div>
      <pre id="share-text" class="bg-gray-50 rounded-xl p-3 text-xs text-gray-700 whitespace-pre-wrap max-h-56 overflow-y-auto border border-gray-200 leading-relaxed"></pre>
    </div>
    <div class="px-6 pb-5">

  </div>
</div>

<div id="toast-container"></div>

      var BG  = {gray:'bg-gray-50',green:'bg-green-50',violet:'bg-violet-50',blue:'bg-blue-50',orange:'bg-orange-50'};
      var DOT = {gray:'bg-gray-500',green:'bg-green-500',violet:'bg-violet-500',blue:'bg-blue-500',orange:'bg-orange-500'};
      var TXT = {gray:'text-gray-700',green:'text-green-700',violet:'text-violet-700',blue:'text-blue-700',orange:'text-orange-700'};
      var milestones = [
        {m:'M0',label:'环境搭建',days:'第1~2天',c:'gray',items:['创建项目目录结构','编写docker-compose.yml（db, redis, api, worker）','alembic初始化 + 数据库迁移','FastAPI基础应用 + 健康检查','钩子安装（已完成 ✅）']},
        {m:'M1',label:'韩国采集器 + AI流水线',days:'第3~10天',c:'green',items:['Olive Young爬虫（Playwright）','Naver购物API集成','Naver博客API集成','Google Trends（pytrends）集成 🆕','Gemma 4 2B本地安装 + 结构化数据提取','Claude API提取器（社交非结构化，含提示词缓存）','Claude API分类器（定期/突发分类）','Celery采集任务连接','API接口实现']},
        {m:'M2',label:'前端开发',days:'第11~16天',c:'violet',items:['Vite + React + TypeScript + Tailwind初始化','搜索栏（多语言自动补全）','现在买/等等再买核心组件','价格图表 + 最低价标注（Recharts）','年度热力图日历','活动时间线 + 活动卡片（定期/突发徽章）','广告区域布局设计']},
        {m:'M3',label:'美国·日本扩展',days:'第17~21天',c:'blue',items:['Sephora、Ulta爬虫','Amazon PA API集成','@cosme、乐天API集成','多语言产品名称匹配（matcher.py）']},
        {m:'M4',label:'中国·社交媒体 + 变现',days:'第22~30天',c:'orange',items:['天猫采集器','Instagram / TikTok / Facebook API','社交帖子 → 活动数据流水线','Google AdSense广告区域应用','高级订阅支付（Portone或Stripe）','推送通知（FCM）']}
      ];
      var rows = milestones.map(function(ms) {
        var lis = ms.items.map(function(i) {
          return '<li class="flex items-start gap-1.5 text-xs text-gray-600"><span class="mt-0.5 w-3.5 h-3.5 border border-gray-300 rounded-sm flex-shrink-0 bg-white"></span>' + i + '</li>';
        }).join('');
        return '<div class="relative">' +
          '<div class="absolute -left-4 w-4 h-4 ' + DOT[ms.c] + ' rounded-full border-2 border-white shadow-sm top-1"></div>' +
          '<div class="' + BG[ms.c] + ' rounded-xl p-4">' +
            '<div class="flex items-center justify-between mb-2">' +
              '<div class="flex items-center gap-2">' +
                '<span class="font-bold ' + TXT[ms.c] + ' text-sm">' + ms.m + '</span>' +
                '<span class="font-semibold text-gray-700 text-sm">' + ms.label + '</span>' +
              '</div>' +
              '<span class="text-xs text-gray-400">' + ms.days + '</span>' +
            '</div>' +
            '<ul class="space-y-1">' + lis + '</ul>' +
          '</div></div>';
      }).join('');
      return '<div class="space-y-3 text-sm"><div class="relative pl-6 space-y-4">' +
        '<div class="absolute left-2 top-2 bottom-2 w-0.5 bg-gray-200"></div>' +
        rows + '</div></div>';
    })()
  }
];

const STORAGE_KEY = 'compa-plan-feedback-v2';
function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
let state = loadState();

function renderSections() {
  document.getElementById('sections-container').innerHTML = PLAN_SECTIONS.map(section => {
    const s = state[section.id] || { status: 'pending', comment: '' };
    return `
    <div id="card-${section.id}" class="section-card status-${s.status} bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <details id="details-${section.id}">
        <summary class="px-6 py-4 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition">
          <div class="flex items-center gap-3 flex-1 min-w-0">
            <span class="text-xl flex-shrink-0">${section.icon}</span>
            <div class="min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-xs text-gray-400 font-mono">#${section.id}</span>
                <h2 class="font-bold text-gray-800 text-base">${section.title}</h2>
                ${s.status !== 'pending' ? `<span class="status-badge-${section.id} flex-shrink-0 text-xs px-2 py-0.5 rounded-full font-medium ${statusBadgeClass(s.status)}">${statusLabel(s.status)}</span>` : `<span class="status-badge-${section.id}"></span>`}
              </div>
              <p class="text-xs text-gray-400 mt-0.5 truncate">${section.summary}</p>
              ${section.prevFeedback ? `<p class="text-xs text-orange-500 mt-0.5 truncate">上次反馈："${section.prevFeedback}"</p>` : ''}
            </div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0 ml-4">
            <div class="flex gap-1" onclick="event.stopPropagation()">
              <button onclick="setStatus(${section.id}, 'approved')" class="btn-status text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:border-green-300 hover:bg-green-50 ${s.status === 'approved' ? 'active-approved' : 'text-gray-500'}" title="批准">✅</button>
              <button onclick="setStatus(${section.id}, 'change')" class="btn-status text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:border-orange-300 hover:bg-orange-50 ${s.status === 'change' ? 'active-change' : 'text-gray-500'}" title="需修改">✏️</button>
              <button onclick="setStatus(${section.id}, 'question')" class="btn-status text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:border-blue-300 hover:bg-blue-50 ${s.status === 'question' ? 'active-question' : 'text-gray-500'}" title="有问题">❓</button>
            </div>
            <svg class="chevron w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
        </summary>
        <div class="px-6 pb-4 border-t border-gray-100">
          <div class="pt-4">${section.content}</div>
          <div class="mt-4 border-t border-gray-100 pt-4">
            <label class="text-xs font-medium text-gray-600 mb-1.5 block">评论 / 反馈</label>
            <div class="flex gap-2">
              <textarea id="comment-${section.id}" rows="2"
                class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700 placeholder-gray-300 resize-none focus:outline-none focus:ring-2 focus:ring-rose-200 focus:border-rose-300 transition"
                placeholder="请随时留下您的意见、问题或建议..."
                onkeydown="if(event.key==='Enter'&&event.metaKey)saveComment(${section.id})"
              >${s.comment || ''}</textarea>
              <button onclick="saveComment(${section.id})" class="text-xs bg-gray-800 hover:bg-gray-700 text-white px-3 py-2 rounded-lg transition self-end whitespace-nowrap">保存</button>
            </div>
            <div id="saved-indicator-${section.id}" class="text-xs text-green-500 mt-1 h-4"></div>
          </div>
        </div>
      </details>
    </div>`;
  }).join('');
}

function statusBadgeClass(s) { return { approved:'bg-green-100 text-green-700', change:'bg-orange-100 text-orange-700', question:'bg-blue-100 text-blue-700' }[s] || ''; }
function statusLabel(s) { return { approved:'✅ 已批准', change:'✏️ 需修改', question:'❓ 有问题', pending:'' }[s] || ''; }

function setStatus(id, status) {
  if (!state[id]) state[id] = { status: 'pending', comment: '' };
  state[id].status = state[id].status === status ? 'pending' : status;
  saveState(state);
  const card = document.getElementById('card-' + id);
  card.className = 'section-card status-' + state[id].status + ' bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden';
  const badge = card.querySelector('.status-badge-' + id);
  const ns = state[id].status;
  if (ns !== 'pending') { badge.className = 'status-badge-' + id + ' flex-shrink-0 text-xs px-2 py-0.5 rounded-full font-medium ' + statusBadgeClass(ns); badge.textContent = statusLabel(ns); }
  else { badge.className = 'status-badge-' + id; badge.textContent = ''; }
  document.getElementById('details-' + id).open = true;
  updateProgress(); updateSummary();
}

function saveComment(id) {
  if (!state[id]) state[id] = { status: 'pending', comment: '' };
  state[id].comment = document.getElementById('comment-' + id).value;
  saveState(state);
  const ind = document.getElementById('saved-indicator-' + id);
  ind.textContent = '已保存 ✓'; setTimeout(function() { ind.textContent = ''; }, 2000);
  updateSummary();
}

function updateProgress() {
  const total = PLAN_SECTIONS.length;
  const counts = { approved:0, change:0, question:0 };
  PLAN_SECTIONS.forEach(function(s) { const st = (state[s.id]||{}).status||'pending'; if(counts[st]!==undefined) counts[st]++; });
  const pending = total - counts.approved - counts.change - counts.question;
  document.getElementById('total-count').textContent = total;
  document.getElementById('approved-count').textContent = counts.approved;
  document.getElementById('progress-bar').style.width = (counts.approved/total*100) + '%';
  document.getElementById('cnt-approved').textContent = counts.approved;
  document.getElementById('cnt-change').textContent = counts.change;
  document.getElementById('cnt-question').textContent = counts.question;
  document.getElementById('cnt-pending').textContent = pending;
}

function updateSummary() {
  const items = PLAN_SECTIONS.filter(function(s) { const st=(state[s.id]||{}).status||'pending'; return st==='change'||st==='question'; });
  const panel = document.getElementById('summary-panel');
  if (!items.length) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');
  document.getElementById('summary-content').innerHTML = items.map(function(s) {
    const st = state[s.id]||{};
    const isChange = st.status==='change';
    return '<div class="px-6 py-4 flex items-start gap-3">' +
      '<span class="text-base">' + s.icon + '</span>' +
      '<div class="flex-1">' +
        '<div class="flex items-center gap-2 mb-1"><span class="text-sm font-semibold text-gray-800">' + s.title + '</span><span class="text-xs px-2 py-0.5 rounded-full ' + (isChange?'bg-orange-100 text-orange-700':'bg-blue-100 text-blue-700') + '">' + (isChange?'✏️ 需修改':'❓ 有问题') + '</span></div>' +
        (st.comment ? '<p class="text-xs text-gray-600 bg-gray-50 rounded-lg px-3 py-2">' + st.comment.replace(/\n/g,'<br/>') + '</p>' : '<p class="text-xs text-gray-400 italic">无评论</p>') +
      '</div></div>';
  }).join('');
}

function copyFeedback() {
  const lines = ['📋 COMPA方案反馈 v2', '日期：' + new Date().toLocaleDateString('zh-CN'), '─'.repeat(30)];
  PLAN_SECTIONS.forEach(function(s) {
    const st = state[s.id] || { status:'pending', comment:'' };
    const emoji = {approved:'✅', change:'✏️', question:'❓', pending:'⬜'}[st.status];
    const label = {approved:'已批准', change:'需修改', question:'有问题', pending:'未审核'}[st.status];
    lines.push(emoji + ' #' + s.id + ' ' + s.title + ' → ' + label);
    if (st.comment) lines.push('   💬 ' + st.comment);
  });
  lines.push('─'.repeat(30));
  lines.push('📱 请通过微信或Telegram发送此消息');
  document.getElementById('share-text').textContent = lines.join('\n');
  document.getElementById('share-modal').classList.remove('hidden');
}

function closeShareModal() {
  document.getElementById('share-modal').classList.add('hidden');
}

function copyShareText() {
  navigator.clipboard.writeText(document.getElementById('share-text').textContent).then(function() {
    showToast('已复制！请粘贴到微信或Telegram 📱');
    closeShareModal();
  });
}

function submitToGitHub() {
  const lines = PLAN_SECTIONS.map(function(s) {
    const st = state[s.id] || { status:'pending', comment:'' };
    const emoji = { approved:'✅', change:'✏️', question:'❓', pending:'⬜' }[st.status];
    return '### ' + emoji + ' ' + s.id + '. ' + s.title + '\n- **状态**: ' + (statusLabel(st.status)||'未审核') + '\n- **评论**: ' + (st.comment||'（无）');
  }).join('\n\n');
  const body = '## COMPA方案反馈（v2）\n\n> 提交日期：' + new Date().toLocaleDateString('zh-CN') + '\n\n' + lines + '\n\n---\n*此问题由[COMPA方案反馈页面](https://wsungahn.github.io/compa/plan-feedback/zh/)自动生成。*';
  const url = 'https://github.com/wsungAhn/compa/issues/new?title=' + encodeURIComponent('📋 方案反馈 — ' + new Date().toLocaleDateString('zh-CN')) + '&body=' + encodeURIComponent(body) + '&labels=feedback';
  window.open(url, '_blank');
  showToast('GitHub问题页面已打开，请登录后点击提交 🐙');
}

function resetAll() {
  if (!confirm('确定要重置所有反馈吗？')) return;
  state = {}; saveState(state); renderSections(); updateProgress(); updateSummary(); showToast('已重置');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast px-4 py-3 rounded-xl shadow-lg text-sm font-medium bg-gray-900 text-white';
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(function() { t.remove(); }, 3500);
}

renderSections(); updateProgress(); updateSummary();
</script>
</body>
</html>
