<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMPA — 플랜 피드백</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans KR', 'Inter', sans-serif; }
    .section-card { transition: box-shadow 0.2s, border-color 0.2s; }
    .section-card.status-approved { border-left: 4px solid #22c55e; }
    .section-card.status-change   { border-left: 4px solid #f97316; }
    .section-card.status-question { border-left: 4px solid #3b82f6; }
    .section-card.status-pending  { border-left: 4px solid #e5e7eb; }
    .btn-status { transition: all 0.15s; }
    .btn-status.active-approved { background: #22c55e; color: white; }
    .btn-status.active-change   { background: #f97316; color: white; }
    .btn-status.active-question { background: #3b82f6; color: white; }
    pre { white-space: pre-wrap; word-break: break-all; }
    .code-block { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 12px 16px; font-family: 'Consolas', monospace; font-size: 13px; overflow-x: auto; }
    .tag-regular { background: #dbeafe; color: #1d4ed8; }
    .tag-surprise { background: #ffedd5; color: #c2410c; }
    details > summary { cursor: pointer; user-select: none; }
    details > summary::-webkit-details-marker { display: none; }
    .chevron { transition: transform 0.2s; }
    details[open] .chevron { transform: rotate(180deg); }
    #progress-bar { transition: width 0.4s ease; }
    .comment-saved { animation: fadeOut 2s forwards; }
    @keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-rose-500 rounded-lg flex items-center justify-center text-white font-bold text-sm">C</div>
      <div>
        <h1 class="text-gray-900 font-bold text-lg leading-tight">COMPA 마스터 플랜</h1>
        <p class="text-gray-400 text-xs">화장품 할인 행사 추적 앱 · 플랜 피드백</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="resetAll()" class="text-xs text-gray-400 hover:text-gray-600 px-3 py-1.5 rounded border border-gray-200 hover:border-gray-300 transition">초기화</button>
      <button onclick="exportFeedback()" class="text-xs bg-gray-900 text-white px-4 py-1.5 rounded-lg hover:bg-gray-700 transition font-medium">피드백 복사 📋</button>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="max-w-5xl mx-auto px-6 pb-4">
    <div class="flex items-center justify-between mb-1.5">
      <span class="text-xs text-gray-500 font-medium">검토 진행률</span>
      <span class="text-xs text-gray-500"><span id="approved-count">0</span> / <span id="total-count">0</span> 섹션 승인</span>
    </div>
    <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
      <div id="progress-bar" class="h-full bg-gradient-to-r from-rose-400 to-rose-500 rounded-full" style="width:0%"></div>
    </div>
    <div class="flex gap-4 mt-2 text-xs text-gray-400">
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span>승인 <span id="cnt-approved" class="font-medium text-gray-600">0</span></span>
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-orange-400 inline-block"></span>수정 필요 <span id="cnt-change" class="font-medium text-gray-600">0</span></span>
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-400 inline-block"></span>질문 <span id="cnt-question" class="font-medium text-gray-600">0</span></span>
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-gray-300 inline-block"></span>미검토 <span id="cnt-pending" class="font-medium text-gray-600">0</span></span>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-8 space-y-6">

  <!-- Context banner -->
  <div class="bg-rose-50 border border-rose-100 rounded-xl p-5">
    <p class="text-sm text-rose-700 leading-relaxed">
      화장품(기초/색조/기능성)을 대상으로 <strong>미국·중국·일본·한국</strong>의 주요 온라인 쇼핑몰과 소셜미디어에서 최근 <strong>3년치 할인 행사</strong> 데이터를 수집·분류하여 <strong>"기다릴지 vs 지금 살지"</strong>를 판단할 수 있는 웹 서비스 개발 플랜입니다.
      각 섹션을 검토 후 상태를 표시하고 코멘트를 남겨주세요.
    </p>
  </div>

  <!-- Sections -->
  <div id="sections-container" class="space-y-5"></div>

  <!-- Feedback Summary -->
  <div id="summary-panel" class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden hidden">
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="font-bold text-gray-800 text-base">피드백 요약</h2>
      <span class="text-xs text-gray-400">수정 필요 + 질문 항목만 표시</span>
    </div>
    <div id="summary-content" class="divide-y divide-gray-50"></div>
  </div>

</main>

<!-- Toast placeholder -->
<div id="toast-container"></div>

// ─── 상태 관리 ───────────────────────────────────────────────
const STORAGE_KEY = 'compa-plan-feedback-v1';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// ─── 렌더링 ───────────────────────────────────────────────
function renderSections() {
  const container = document.getElementById('sections-container');
  container.innerHTML = PLAN_SECTIONS.map(section => {
    const s = state[section.id] || { status: 'pending', comment: '' };
    return `
    <div id="card-${section.id}" class="section-card status-${s.status} bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <!-- Card Header -->
      <details id="details-${section.id}" ${s.status !== 'pending' ? 'open' : ''}>
        <summary class="px-6 py-4 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition select-none">
          <div class="flex items-center gap-3 flex-1 min-w-0">
            <span class="text-xl flex-shrink-0">${section.icon}</span>
            <div class="min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 font-mono">#${section.id}</span>
                <h2 class="font-bold text-gray-800 text-base">${section.title}</h2>
                ${s.status !== 'pending' ? `<span class="status-badge-${section.id} flex-shrink-0 text-xs px-2 py-0.5 rounded-full font-medium ${statusBadgeClass(s.status)}">${statusLabel(s.status)}</span>` : `<span class="status-badge-${section.id}"></span>`}
              </div>
              <p class="text-xs text-gray-400 mt-0.5 truncate">${section.summary}</p>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0 ml-4">
            <!-- Status buttons -->
            <div class="flex gap-1" onclick="event.stopPropagation()">
              <button onclick="setStatus(${section.id}, 'approved')" class="btn-status text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:border-green-300 hover:bg-green-50 ${s.status === 'approved' ? 'active-approved' : 'text-gray-500'}" title="승인">✅</button>
              <button onclick="setStatus(${section.id}, 'change')" class="btn-status text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:border-orange-300 hover:bg-orange-50 ${s.status === 'change' ? 'active-change' : 'text-gray-500'}" title="수정 필요">✏️</button>
              <button onclick="setStatus(${section.id}, 'question')" class="btn-status text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:border-blue-300 hover:bg-blue-50 ${s.status === 'question' ? 'active-question' : 'text-gray-500'}" title="질문">❓</button>
            </div>
            <svg class="chevron w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
          </div>
        </summary>

        <!-- Content -->
        <div class="px-6 pb-4 border-t border-gray-100">
          <div class="pt-4">${section.content}</div>

          <!-- Comment area -->
          <div class="mt-4 border-t border-gray-100 pt-4">
            <label class="text-xs font-medium text-gray-600 mb-1.5 block">코멘트 / 피드백</label>
            <div class="flex gap-2">
              <textarea id="comment-${section.id}" rows="2"
                class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700 placeholder-gray-300 resize-none focus:outline-none focus:ring-2 focus:ring-rose-200 focus:border-rose-300 transition"
                placeholder="수정 사항, 질문, 추가 아이디어 등을 입력하세요..."
                onkeydown="if(event.key==='Enter'&&event.metaKey)saveComment(${section.id})"
              >${s.comment || ''}</textarea>
              <button onclick="saveComment(${section.id})" class="text-xs bg-gray-800 hover:bg-gray-700 text-white px-3 py-2 rounded-lg transition self-end whitespace-nowrap">저장<br/><span class="text-gray-400 text-[10px]">⌘↵</span></button>
            </div>
            <div id="saved-indicator-${section.id}" class="text-xs text-green-500 mt-1 h-4"></div>
          </div>
        </div>
      </details>
    </div>`;
  }).join('');
}

function statusBadgeClass(status) {
  return { approved: 'bg-green-100 text-green-700', change: 'bg-orange-100 text-orange-700', question: 'bg-blue-100 text-blue-700', pending: '' }[status] || '';
}
function statusLabel(status) {
  return { approved: '✅ 승인', change: '✏️ 수정 필요', question: '❓ 질문', pending: '' }[status] || '';
}

// ─── 상태 업데이트 ───────────────────────────────────────────
function setStatus(id, status) {
  if (!state[id]) state[id] = { status: 'pending', comment: '' };
  const prev = state[id].status;
  state[id].status = (prev === status) ? 'pending' : status; // 토글
  saveState(state);

  const card = document.getElementById(`card-${id}`);
  card.className = `section-card status-${state[id].status} bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden`;

  const badge = card.querySelector(`.status-badge-${id}`);
  const newStatus = state[id].status;
  if (newStatus !== 'pending') {
    badge.className = `status-badge-${id} flex-shrink-0 text-xs px-2 py-0.5 rounded-full font-medium ${statusBadgeClass(newStatus)}`;
    badge.textContent = statusLabel(newStatus);
  } else {
    badge.className = `status-badge-${id}`;
    badge.textContent = '';
  }

  updateProgress();
  updateSummary();
  document.getElementById(`details-${id}`).open = true;
}

function saveComment(id) {
  if (!state[id]) state[id] = { status: 'pending', comment: '' };
  state[id].comment = document.getElementById(`comment-${id}`).value;
  saveState(state);

  const indicator = document.getElementById(`saved-indicator-${id}`);
  indicator.textContent = '저장되었습니다';
  indicator.className = 'text-xs text-green-500 mt-1 h-4';
  setTimeout(() => { indicator.textContent = ''; }, 2000);

  updateSummary();
}

// ─── 진행률 업데이트 ────────────────────────────────────────
function updateProgress() {
  const total = PLAN_SECTIONS.length;
  const counts = { approved: 0, change: 0, question: 0, pending: 0 };
  PLAN_SECTIONS.forEach(s => {
    const st = (state[s.id] || {}).status || 'pending';
    counts[st] = (counts[st] || 0) + 1;
  });
  counts.pending = total - counts.approved - counts.change - counts.question;

  document.getElementById('total-count').textContent = total;
  document.getElementById('approved-count').textContent = counts.approved;
  document.getElementById('progress-bar').style.width = `${(counts.approved / total) * 100}%`;
  document.getElementById('cnt-approved').textContent = counts.approved;
  document.getElementById('cnt-change').textContent = counts.change;
  document.getElementById('cnt-question').textContent = counts.question;
  document.getElementById('cnt-pending').textContent = counts.pending;
}

// ─── 요약 패널 ──────────────────────────────────────────────
function updateSummary() {
  const items = PLAN_SECTIONS.filter(s => {
    const st = (state[s.id] || {}).status || 'pending';
    return st === 'change' || st === 'question';
  });

  const panel = document.getElementById('summary-panel');
  const content = document.getElementById('summary-content');

  if (items.length === 0) {
    panel.classList.add('hidden');
    return;
  }

  panel.classList.remove('hidden');
  content.innerHTML = items.map(s => {
    const st = state[s.id] || {};
    const isChange = st.status === 'change';
    return `
    <div class="px-6 py-4">
      <div class="flex items-start gap-3">
        <span class="text-base">${s.icon}</span>
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-sm font-semibold text-gray-800">${s.title}</span>
            <span class="text-xs px-2 py-0.5 rounded-full ${isChange ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}">${isChange ? '✏️ 수정 필요' : '❓ 질문'}</span>
          </div>
          ${st.comment ? `<p class="text-xs text-gray-600 bg-gray-50 rounded-lg px-3 py-2">${st.comment.replace(/\n/g, '<br/>')}</p>` : `<p class="text-xs text-gray-400 italic">코멘트 없음</p>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── 내보내기 ───────────────────────────────────────────────
function exportFeedback() {
  const result = {
    exported_at: new Date().toISOString(),
    project: 'COMPA 마스터 플랜',
    sections: PLAN_SECTIONS.map(s => {
      const st = state[s.id] || { status: 'pending', comment: '' };
      return { id: s.id, title: s.title, status: st.status, comment: st.comment || null };
    })
  };
  navigator.clipboard.writeText(JSON.stringify(result, null, 2)).then(() => {
    showToast('피드백이 클립보드에 복사되었습니다 ✅');
  }).catch(() => {
    showToast('복사 실패 — 브라우저 권한을 확인해주세요 ⚠️', true);
  });
}

function resetAll() {
  if (!confirm('모든 피드백을 초기화할까요?')) return;
  state = {};
  saveState(state);
  renderSections();
  updateProgress();
  updateSummary();
  showToast('초기화되었습니다');
}

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.className = `toast px-4 py-3 rounded-xl shadow-lg text-sm font-medium ${isError ? 'bg-red-600 text-white' : 'bg-gray-900 text-white'}`;
  toast.textContent = msg;
  document.getElementById('toast-container').appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ─── 초기화 ─────────────────────────────────────────────────
renderSections();
updateProgress();
updateSummary();
</script>
</body>
</html>
